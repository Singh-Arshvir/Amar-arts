<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amar Arts</title>
    <script>
      // Force title to Amar Arts to prevent caching issues from other projects
      document.title = "Amar Arts";
      // Re-run periodically just in case something else tries to override it
      setInterval(() => {
        if (document.title !== "Amar Arts") document.title = "Amar Arts";
      }, 1000);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
